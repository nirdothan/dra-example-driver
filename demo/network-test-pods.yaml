---
apiVersion: v1
kind: Pod
metadata:
  name: network-pod-1
  namespace: default
spec:
  containers:
  - name: test
    image: ubuntu:22.04
    command: ["bash", "-c"]
    args:
    - |
      echo "Pod: network-pod-1"
      echo "Network device: $KUBEVIRT_NETWORK_DEVICE"
      echo "Network path: $KUBEVIRT_NETWORK_PATH"
      echo "Directory contents:"
      ls -la $KUBEVIRT_NETWORK_PATH
      echo "Creating test file..."
      echo "Hello from network-pod-1" > $KUBEVIRT_NETWORK_PATH/test-file.txt
      echo "File created. Sleeping..."
      sleep infinity
    resources:
      claims:
      - name: network
  resourceClaims:
  - name: network
    resourceClaimTemplateName: network-claim-template
